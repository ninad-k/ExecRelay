{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "execrelay.fullname" . }}
  labels:
    {{- include "execrelay.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if contains "portal" .host }}
                name: {{ include "execrelay.fullname" $ }}-portal-web
                port:
                  number: 80
                {{- else if contains "webhook" .host }}
                name: {{ include "execrelay.fullname" $ }}-ingress
                port:
                  number: 8080
                {{- else }}
                name: {{ include "execrelay.fullname" $ }}-portal-api
                port:
                  number: 8080
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
