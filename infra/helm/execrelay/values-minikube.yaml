image:
  registry: docker.io
  pullPolicy: IfNotPresent

services:
  ingress:
    replicaCount: 1
    service:
      type: NodePort
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  bridge:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  dxtrade:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  persist:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  "portal-api":
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  tasks:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  analytics:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  reports:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  "portal-web":
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

autoscaling:
  enabled: false

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: api.local
      paths:
        - path: /
          pathType: Prefix
    - host: portal.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgresql:
  enabled: false

natsUrl: "nats://execrelay:execrelay_nats_dev@nats:4222"
databaseUrl: "postgresql://execrelay:execrelay_dev_password@postgres:5432/execrelay"
jwtSecret: "changeme-in-minikube"
licenses: ""
pagerdutyKey: ""
slackWebhookUrl: ""
