global:
  resolve_timeout: 5m

route:
  receiver: pagerduty
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: pagerduty
      group_wait: 5s
      group_interval: 5s
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: slack_warnings
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
    - match:
        severity: info
      receiver: "null"

receivers:
  - name: "null"

  - name: pagerduty
    pagerduty_configs:
      - service_key: ${PAGERDUTY_INTEGRATION_KEY}
        description: "{{ .GroupLabels.alertname }}"
        details:
          firing: "{{ template \"pagerduty.default.instances\" .Alerts.Firing }}"

  - name: slack_warnings
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: '#alerts-warnings'
        title: 'Warning Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']
