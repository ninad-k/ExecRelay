global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: nats
    metrics_path: /varz
    static_configs:
      - targets: ["nats:8222"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
