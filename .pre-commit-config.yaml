# Run locally:  pre-commit install   # one-time per clone
# Run on all:   pre-commit run --all-files
# Skip a hook:  SKIP=gitleaks git commit ...

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$|^apps/portal-web/package-lock\.json$|^apps/ml-predictor/model/'
      - id: end-of-file-fixer
        # ml-predictor/model holds generated training artifacts — don't mutate them.
        exclude: '^apps/portal-web/package-lock\.json$|^apps/ml-predictor/model/'
      - id: check-yaml
        args: [--unsafe]   # allow GitHub Actions tags
        exclude: '^infra/helm/.*/templates/.*\.yaml$'   # Helm templates use {{- }} which isn't valid YAML
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
        # The trained XGBoost artifact ships with the image (~900 KB, see
        # apps/ml-predictor/Dockerfile) and is intentionally tracked.
        exclude: '^apps/ml-predictor/model/'
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Lint findings (E702/F841/E722/E402) were triaged and fixed; deliberate
      # sys.path-insertion import patterns in ml-predictor's tests are
      # allow-listed via per-file-ignores in ruff.toml instead of inline
      # noqa comments. See ruff.toml at the repo root for the ruff config.
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]
        pass_filenames: true
      - id: go-vet
        name: go vet
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && go vet ./...'
        language: system
        types: [go]
        pass_filenames: false
