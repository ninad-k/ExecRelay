name: ci-shared

on:
  pull_request:
    paths:
      - 'internal/**'
      - 'packages/**'
      - 'go.mod'
      - 'go.sum'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'internal/**'
      - 'packages/**'
      - 'go.mod'
      - 'go.sum'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  go-shared-tests:
    name: Shared Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./internal/... ./packages/...
      - run: go test -race -count=1 ./internal/... ./packages/...

  compose-config:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config >/dev/null
