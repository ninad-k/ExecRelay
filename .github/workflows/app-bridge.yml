name: app-bridge

on:
  pull_request:
    paths:
      - 'apps/bridge/**'
      - 'internal/**'
      - 'packages/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/app-bridge.yml'
      - '.github/workflows/reusable-go-app.yml'
  push:
    branches: [main]
    paths:
      - 'apps/bridge/**'
      - 'internal/**'
      - 'packages/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/app-bridge.yml'
      - '.github/workflows/reusable-go-app.yml'

jobs:
  ci:
    uses: ./.github/workflows/reusable-go-app.yml
    with:
      app_name: bridge
