name: app-risk

on:
  pull_request:
    paths:
      - 'apps/risk/**'
      - '.github/workflows/app-risk.yml'
      - '.github/workflows/reusable-python-app.yml'
  push:
    branches: [main]
    paths:
      - 'apps/risk/**'
      - '.github/workflows/app-risk.yml'
      - '.github/workflows/reusable-python-app.yml'

jobs:
  ci:
    uses: ./.github/workflows/reusable-python-app.yml
    with:
      app_name: risk
