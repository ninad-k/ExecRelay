name: app-backtester

on:
  pull_request:
    paths:
      - 'apps/backtester/**'
      - '.github/workflows/app-backtester.yml'
      - '.github/workflows/reusable-python-app.yml'
  push:
    branches: [main]
    paths:
      - 'apps/backtester/**'
      - '.github/workflows/app-backtester.yml'
      - '.github/workflows/reusable-python-app.yml'

jobs:
  ci:
    uses: ./.github/workflows/reusable-python-app.yml
    with:
      app_name: backtester
      has_requirements: true
