name: shellcheck

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/shellcheck.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/shellcheck.yml'

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install shellcheck
        run: sudo apt-get -qq update && sudo apt-get -qq install -y shellcheck
      - name: Lint scripts
        run: |
          fail=0
          for f in scripts/*.sh; do
            echo "::group::shellcheck $f"
            if ! shellcheck -x "$f"; then fail=1; fi
            echo "::endgroup::"
          done
          exit $fail
